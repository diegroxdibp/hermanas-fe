<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Care · FAQ Lateral — referência</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #eef0f5; }
    * { -webkit-font-smoothing: antialiased; }
    button { font-family: var(--font-sans); }
    @keyframes faqBreathe { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-6px) scale(1.015); } }
    .faq-breathe { animation: faqBreathe 6s var(--ease-care) infinite; transform-origin: center bottom; }
    @media (prefers-reduced-motion: reduce) { .faq-breathe { animation: none; } }

    .stage { display: flex; gap: 56px; flex-wrap: wrap; justify-content: center; align-items: flex-start; padding: 56px 32px 80px; }
    .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .lbl { font-family: var(--font-sans); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--color-muted); }
    .card-desktop { width: 880px; max-width: calc(100vw - 64px); background: #fff; border-radius: 18px; box-shadow: 0 16px 50px rgba(34,50,110,.12); overflow: hidden; }
    .phone { width: 392px; max-width: calc(100vw - 64px); background: #fff; border-radius: 40px; padding: 10px; box-shadow: 0 20px 60px rgba(34,50,110,.20); }
    .phone-screen { background: #fff; border-radius: 30px; overflow: hidden; }
    .intro { max-width: 760px; margin: 0 auto; padding: 40px 32px 0; font-family: var(--font-sans); color: var(--color-secondary-indigo); }
    .intro h1 { font-size: 24px; color: var(--color-primary-blue); margin: 0 0 8px; }
    .intro p { font-size: 15px; line-height: 1.6; text-align: left; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="intro">
    <h1>FAQ · direção “Lateral”</h1>
    <p>Referência visual da opção 2. À esquerda, a versão desktop (navegação lateral fixa + respostas). À direita, a versão mobile (acordeão aninhado: tocar num tema abre as perguntas no lugar). Tudo é interativo — clique para testar.</p>
  </div>

  <div class="stage">
    <div class="col">
      <div class="lbl">Desktop</div>
      <div class="card-desktop"><div id="desktop"></div></div>
    </div>
    <div class="col">
      <div class="lbl">Mobile</div>
      <div class="phone"><div class="phone-screen"><div id="mobile"></div></div></div>
    </div>
  </div>

  <script src="faq-data.js"></script>
  <script type="text/babel" src="faq-kit.jsx"></script>
  <script type="text/babel" src="faq-variations.jsx"></script>
  <script type="text/babel">
    const { VarLateral } = window;
    ReactDOM.createRoot(document.getElementById('desktop')).render(<VarLateral mobile={false} />);
    ReactDOM.createRoot(document.getElementById('mobile')).render(<VarLateral mobile={true} />);
  </script>
</body>
</html>
