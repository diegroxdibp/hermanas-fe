<div class="toast" (mouseenter)="pause()" (mouseleave)="resume()" role="status" aria-live="polite">
  <div class="toast__body">
    <span class="toast__msg">{{ message }}</span>
    <button class="toast__close" type="button" aria-label="Fechar" (click)="dismiss()">✕</button>
  </div>
  <div class="toast__track">
    <div class="toast__bar" [style.width.%]="pct"></div>
  </div>
</div>
