<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CARE — Header / user menu</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-sans); color: var(--fg-1); }

  /* Stage: a slice of a real page so the user can judge contrast */
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .page-body {
    flex: 1;
    padding: 56px 40px 80px;
    max-width: 1140px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
  }
  .page-body h1 {
    font-size: 48px;
    line-height: 1.1;
    margin-bottom: 18px;
  }
  .page-body p {
    max-width: 640px;
    color: var(--fg-1);
  }
  .stage-hint {
    font-size: 13px;
    font-style: italic;
    color: var(--fg-3);
    margin-top: 32px;
    text-align: left;
  }

  /* Material symbols sizing default */
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    user-select: none;
  }

  /* keyframes for badge entrance */
  @keyframes badgePop {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes pulseDot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217, 48, 79, 0.55); }
    70%      { box-shadow: 0 0 0 8px rgba(217, 48, 79, 0); }
  }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="header.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
