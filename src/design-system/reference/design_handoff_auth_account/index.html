<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Care · Auth & Account screens</title>
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f3f4f8; font-family: var(--font-sans); }
    * { box-sizing: border-box; }
    button { font-family: var(--font-sans); }
    /* date input chrome cleanup */
    input[type="date"] {
      font-family: var(--font-sans);
      color: var(--color-primary-blue);
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0;
      position: absolute;
      right: 8px;
      width: 28px;
      height: 28px;
      cursor: pointer;
    }
    /* native select option styling */
    option { font-family: var(--font-sans); color: var(--color-primary-blue); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="account.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas title="Care · Auth & Account">
          <DCSection id="auth" title="Auth & Onboarding · desktop">
            <DCArtboard id="signin" label="Sign In" width={1320} height={900}>
              <SignInScreen />
            </DCArtboard>
            <DCArtboard id="signup" label="Sign Up" width={1320} height={900}>
              <SignUpScreen />
            </DCArtboard>
            <DCArtboard id="onboarding" label="Onboarding · perfil" width={1320} height={900}>
              <OnboardingScreen />
            </DCArtboard>
          </DCSection>

          <DCSection id="dashboard" title="Dashboard · desktop">
            <DCArtboard id="account-edit" label="Conta · editar" width={1320} height={1320}>
              <AccountEditScreen />
            </DCArtboard>
          </DCSection>

          <DCSection id="mobile-auth" title="Auth & Onboarding · mobile">
            <DCArtboard id="m-signin" label="Sign In" width={390} height={780}>
              <MobileSignInScreen />
            </DCArtboard>
            <DCArtboard id="m-signup" label="Sign Up" width={390} height={980}>
              <MobileSignUpScreen />
            </DCArtboard>
            <DCArtboard id="m-onboarding" label="Onboarding · perfil" width={390} height={900}>
              <MobileOnboardingScreen />
            </DCArtboard>
          </DCSection>

          <DCSection id="mobile-dash" title="Dashboard · mobile">
            <DCArtboard id="m-account-edit" label="Conta · editar" width={390} height={1480}>
              <MobileAccountEditScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
