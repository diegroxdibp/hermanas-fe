<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Care — Hero</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-sans); color: var(--fg-1); }
  button { font-family: inherit; cursor: pointer; }

  /* ============ HEADER ============ */
  .site-header {
    position: sticky; top: 0; z-index: 40;
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 clamp(20px, 4vw, 56px);
    background: rgba(255,255,255,0.86);
    backdrop-filter: saturate(1.1) blur(6px);
    border-bottom: 1px solid var(--color-border-soft);
  }
  .site-header img.logo { height: 36px; display: block; }
  .nav { display: flex; align-items: center; gap: clamp(20px, 2.6vw, 40px); }
  .nav-links { display: flex; align-items: center; gap: clamp(18px, 2.2vw, 34px); }
  .nav-links a {
    font-size: var(--fs-nav); font-weight: var(--fw-medium); font-style: italic;
    color: var(--fg-1); text-decoration: none; position: relative;
    transition: color var(--dur-fast) ease, transform var(--dur-fast) ease;
  }
  .nav-links a:hover { color: var(--fg-accent); transform: scale(1.08); }
  .nav-links a.active { color: var(--fg-accent); }
  .nav-links a.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -7px; height: 2px;
    background: var(--fg-accent); border-radius: 2px;
  }
  .header-right { display: flex; align-items: center; gap: 18px; }
  .icon-btn {
    width: 40px; height: 40px; border: none; background: transparent; border-radius: 999px;
    display: grid; place-items: center; color: var(--fg-1);
    transition: background var(--dur-fast) ease;
  }
  .icon-btn:hover { background: var(--color-surface-tint); }
  .icon-btn .material-symbols-outlined { font-size: 24px; }
  .user-pill {
    display: flex; align-items: center; gap: 10px; padding: 5px 10px 5px 5px;
    border-radius: 999px; border: 1px solid var(--color-border-soft); background: #fff;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 999px; display: grid; place-items: center;
    background: var(--color-primary-blue); color: #fff; font-weight: 700; font-size: 13px;
  }
  .user-meta { display: flex; flex-direction: column; line-height: 1.05; }
  .user-meta b { font-size: 14px; font-weight: 600; color: var(--fg-1); }
  .user-meta span { font-size: 12px; color: var(--fg-3); }
  .user-pill .material-symbols-outlined { font-size: 20px; color: var(--fg-3); }

  /* ============ HERO (shared) ============ */
  .hero {
    position: relative; width: 100%; overflow: hidden;
    background: var(--bg-page);
  }

  /* ---- transparent cut-out portrait, sitting directly on the wall ---- */
  .portrait { position: relative; }
  .portrait .hero-photo {
    display: block; position: absolute; bottom: -7%; right: var(--person-x);
    height: calc(112% * var(--person-scale)); width: auto; max-width: none;
    object-fit: contain; object-position: bottom right; z-index: 1;
  }
  .portrait[data-ground="1"] .hero-photo {
    filter: drop-shadow(16px 22px 30px rgba(34, 50, 110, 0.18));
  }
  .portrait-halo {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(58% 56% at 64% 40%,
      rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.45) 38%, rgba(255,255,255,0) 70%);
  }

  .h-eyebrow {
    font-size: 14px; font-weight: 600; font-style: italic; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent); margin: 0 0 4px;
  }
  .h-title {
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    margin: 0; line-height: 1.02; color: var(--color-primary-blue);
    font-weight: 700; font-size: calc(clamp(38px, 5vw, 66px) * var(--hscale));
    letter-spacing: 0.5px; max-width: 12ch;
  }
  .h-word { color: var(--accent); display: block; }
  .h-word.typed { display: inline-flex; align-items: baseline; min-height: 1.04em; }
  .h-cursor {
    display: inline-block; width: 3px; height: 0.78em; margin-left: 6px; align-self: center;
    background: var(--accent); transform: translateY(0.04em);
    animation: ccblink 0.8s steps(1) infinite;
  }
  @keyframes ccblink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .h-cursor { animation: none; } }
  .h-sub {
    max-width: 30ch; margin: 22px 0 0; text-align: left;
    font-size: clamp(17px, 1.35vw, 21px); line-height: 1.6; color: var(--color-primary-blue);
    font-weight: 400;
  }
  .h-cta { display: flex; align-items: center; gap: 22px; margin-top: 30px; flex-wrap: wrap; }
  .btn-primary {
    border: none; background: var(--color-primary-blue); color: #fff;
    font-size: 17px; font-weight: 600; padding: 14px 30px; border-radius: var(--radius-lg);
    display: inline-flex; align-items: center; gap: 10px;
    transition: transform var(--dur-fast) ease, background var(--dur-fast) ease;
  }
  .btn-primary:hover { transform: translateY(-2px); background: #2b3d83; }
  .btn-primary .material-symbols-outlined { font-size: 20px; }
  .link-ghost {
    background: none; border: none; color: var(--color-primary-blue);
    font-size: 17px; font-weight: 600; font-style: italic; padding: 6px 2px;
    border-bottom: 2px solid transparent; transition: color var(--dur-fast) ease, border-color var(--dur-fast) ease;
  }
  .link-ghost:hover { color: var(--accent); border-color: var(--accent); }

  .motif-hands {
    position: absolute; z-index: 0; pointer-events: none; opacity: 0.4;
    mix-blend-mode: multiply; left: 4%; bottom: 6%; height: 34%;
  }

  /* ---- Layout A: Full-bleed ---- */
  /* ============ MOBILE ============ */
  .menu-btn { display: none; }
  @media (max-width: 880px) {
    .nav-links, .user-meta, .user-pill { display: none; }
    .menu-btn { display: grid; }
    .site-header { padding: 0 18px; }
    .site-header img.logo { height: 32px; }

    /* Full-bleed → stacked: portrait band on top, content below */
    .hero.fullbleed { display: block; height: auto; padding-bottom: 36px; }
    .hero.fullbleed .portrait.fb {
      position: relative; width: 100%; height: 46vh; min-height: 320px; max-height: 440px;
    }
    .hero.fullbleed .h-content { padding: 26px 22px 0; }
    .hero.fullbleed .h-stack { max-width: 100%; }

    /* Split → stacked */
    .hero.split { height: auto; grid-template-columns: 1fr; }
    .hero.split .pane-photo { order: -1; min-height: 320px; height: 46vh; max-height: 440px; }
    .hero.split .pane-text { padding: 30px 22px 40px; }

    /* Framed → stacked */
    .hero.framed { grid-template-columns: 1fr; min-height: 0; padding: 24px 22px 40px; gap: 24px; }
    .hero.framed .frame { order: -1; aspect-ratio: 4 / 3.6; }

    .portrait .hero-photo { height: calc(118% * var(--person-scale)); }
    .h-title { font-size: calc(clamp(34px, 11vw, 46px) * var(--hscale)); max-width: 100%; }
    .h-sub { max-width: 100%; font-size: 17px; }
    .h-cta { gap: 16px; margin-top: 24px; }
    .btn-primary { width: 100%; justify-content: center; }
    .concepts .item { font-size: 18px; letter-spacing: 4px; }
  }

  @media (max-width: 480px) {
    .h-cta { flex-direction: column; align-items: stretch; }
    .link-ghost { text-align: center; }
  }
  /* ---- Layout A: Full-bleed (cut-out portrait stands on the wall, right side) ---- */
  .hero.fullbleed {
    height: clamp(560px, 86vh, 820px);
    display: flex; align-items: center;
    background: linear-gradient(180deg, #f5f4f9 0%, #ecebf3 100%);
  }
  .hero.fullbleed .portrait.fb {
    position: absolute; top: 0; right: 0; bottom: 0; width: 64%;
  }
  /* crop / zoom: top edge of the hero slices through the face */
  .hero.fullbleed .hero-photo {
    height: calc(var(--crop-h, 119%) * var(--person-scale, 1));
    bottom: var(--crop-bottom, -7%);
    right: calc(var(--person-x, 2%) + var(--crop-rx, 0%));
  }
  .hero.fullbleed .h-content {
    position: relative; z-index: 3; width: 100%;
    max-width: var(--col-lg); margin: 0 auto; padding: 0 clamp(24px, 5vw, 64px);
  }
  .hero.fullbleed .h-stack { max-width: 480px; }

  /* ---- Layout B: Split ---- */
  .hero.split { height: clamp(560px, 86vh, 820px); display: grid; grid-template-columns: 1fr 1fr; }
  .hero.split .pane-text {
    background: var(--color-surface-tint);
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 clamp(28px, 5vw, 80px); position: relative; z-index: 2;
  }
  .hero.split .pane-text .inner { max-width: 460px; }
  .hero.split .pane-photo {
    position: relative; overflow: hidden;
    background: linear-gradient(165deg, #ece9f5 0%, #e0e8f3 100%);
  }
  .hero.split .portrait.sp { position: absolute; inset: 0; }

  /* ---- Layout C: Framed ---- */
  .hero.framed { min-height: clamp(560px, 86vh, 820px); display: grid;
    grid-template-columns: minmax(360px, 1fr) 1.1fr; align-items: center;
    gap: clamp(24px, 4vw, 64px); padding: clamp(36px, 5vw, 64px) clamp(28px, 5vw, 72px);
    max-width: 1340px; margin: 0 auto; }
  .hero.framed .frame {
    position: relative; border-radius: var(--radius-xl); overflow: hidden;
    aspect-ratio: 4 / 3.4; box-shadow: var(--shadow-floating);
    background: linear-gradient(160deg, #ece9f5 0%, #dfe7f2 100%);
  }
  .hero.framed .portrait.fr { position: absolute; inset: 0; }
  .hero.framed .portrait.fr .hero-photo {
    right: auto; left: 50%; object-position: bottom center;
    height: calc(118% * var(--person-scale));
    transform: translateX(calc(-50% + var(--person-x)));
  }
  .hero.framed .frame .tab {
    position: absolute; left: 0; bottom: 22px; z-index: 2; background: var(--color-primary-blue); color: #fff;
    font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 16px 8px 22px; border-radius: 0 999px 999px 0;
  }

  /* ============ CONTEXT STRIP (marquee) ============ */
  .concepts { background: #fff; border-top: 1px solid var(--color-border-soft);
    padding: 26px 0; overflow: hidden; white-space: nowrap; }
  .concepts .track { display: inline-flex; gap: 64px; animation: marq 26s linear infinite; }
  .concepts .item { font-style: italic; font-weight: 500; font-size: 22px;
    letter-spacing: 6px; color: var(--color-primary-blue); }
  .concepts .item.alt { color: var(--color-primary-purple); }
  @keyframes marq { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* entrance */
  .reveal { animation: fadeUp 1s var(--ease-care) both; }
  .reveal.d1 { animation-delay: .08s; }
  .reveal.d2 { animation-delay: .16s; }
  .reveal.d3 { animation-delay: .24s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .reveal { animation: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hero-app.jsx"></script>
</body>
</html>
