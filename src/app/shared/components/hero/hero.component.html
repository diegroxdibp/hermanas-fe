<section class="hero">

  <!-- Portrait: transparent cut-out anchored right -->
  <div class="portrait">
    <div class="portrait-halo" aria-hidden="true"></div>
    <img
      class="hero-photo reveal"
      src="assets/images/care-hero-cut.png"
      alt="Pessoa em um momento de acolhimento"
    />
  </div>

  <!-- Content -->
  <div class="h-content">
    <div class="h-stack">

      <h1 class="h-title reveal d1">
        <span>Care é</span>
        <span class="h-word typed">{{ typedText() }}<span class="h-cursor" aria-hidden="true"></span></span>
      </h1>

      <p class="h-sub reveal d2">
        Uma clínica ampliada de cuidado em saúde mental, relacional, física e social.
      </p>

      <div class="h-cta reveal d3">
        <button class="btn-primary" (click)="navigateToScheduling()">
          Agendar um atendimento
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>

    </div>
  </div>

</section>
