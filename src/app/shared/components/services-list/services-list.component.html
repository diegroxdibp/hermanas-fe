@for (service of AppConstants.services; track service.name; let serviceIndex = $index) {
<content class="service">
    <h2>{{ service.name }}</h2>
    <ul>
        @for (serviceType of service.serviceType; track serviceType.name; let typeIndex = $index) {
        <li class="service-type">
            <div class="service-name" (click)="toggleItem(serviceIndex + '-' + typeIndex)">
                <h3>{{ serviceType.name }}</h3>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"
                    [class.invert]="expandedItems[serviceIndex + '-' + typeIndex]" class="expand-icon">
                    <path
                        d="M50,61.8472a2.9963,2.9963,0,0,1-1.8481-.6367L25.5264,43.5161A3,3,0,0,1,29.2227,38.79L50,55.0386,70.7773,38.79a3,3,0,1,1,3.6963,4.7266L51.8481,61.21A2.9963,2.9963,0,0,1,50,61.8472Z" />
                </svg>
            </div>

            <div class="service-content"
                [@expandCollapse]="expandedItems[serviceIndex + '-' + typeIndex] ? 'expanded' : 'collapsed'">
                <p class="service-description">
                    {{ serviceType.description }}
                </p>
                <div class="service-actions">
                    <button mat-raised-button (click)="navigateTo(serviceType.knowMorePage)">
                        <a>SAIBA MAIS</a>
                    </button>
                    <button mat-raised-button (click)="navigateTo(Pages.SCHEDULING)">
                        <a>AGENDAR</a>
                    </button>
                </div>
            </div>
        </li>
        }
    </ul>
</content>
}
