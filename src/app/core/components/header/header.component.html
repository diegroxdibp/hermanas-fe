<div [class]="{ filler: fixedHeader && !isHomePage }"></div>

<header
  #header
  [class]="{ fixed: fixedHeader }"
  [style]="{ backgroundColor: backgroundColor }"
>
  <logo-horizontal [hasHomeNavigation]="true"></logo-horizontal>
  <nav id="navbar">
    @if (screenSizeService.isTablet() || screenSizeService.isDesktop()) {
      <ul>
        <li *ngFor="let navigationItem of navigationService.navigationItems">
          <a
            (click)="navigateTo(navigationItem.destination)"
            class="menu-item"
            >{{ navigationItem.name }}</a
          >
        </li>
      </ul>

      @if (navbarService.showAuthLinks()) {
        <ul class="auth">
          <li>
            <a (click)="navigateTo(navigationService.Pages.SIGN_IN)">Sign In</a>
          </li>
        </ul>
      }
      @if (navbarService.showUserMenu()) {
        <button class="user-chip" [matMenuTriggerFor]="menu">
          <div class="avatar">{{ userInitials() }}</div>
          <div class="who">
            {{ firstName() }}
            <small>Paciente</small>
          </div>
          <span class="material-symbols-outlined chevron">expand_more</span>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="navigateTo(navigationService.Pages.DASHBOARD)">Conta</button>
          <button mat-menu-item (click)="logOut()">Terminar Sessão</button>
        </mat-menu>
      }
    }
    @if (!(screenSizeService.isTablet() || screenSizeService.isDesktop())) {
      <app-fullscreen-menu></app-fullscreen-menu>
    }
  </nav>
</header>
