<div class="page">
  <form (submit)="signUp($event)" novalidate>
    <h1>Crie sua conta</h1>
    <p class="subtitle">Um espaço para acolher quem cuida e quem precisa de cuidado.</p>

    <div class="field">
      <label for="email">Email:</label>
      <input
        id="email"
        type="email"
        [formControl]="emailCtrl"
        placeholder="seu@email.com"
        autocomplete="email"
      />
    </div>

    <div class="field" style="margin-bottom: 8px">
      <label for="password">Password:</label>
      <input
        id="password"
        type="password"
        [formControl]="passwordCtrl"
        placeholder="••••••••"
        autocomplete="new-password"
      />
    </div>

    <div class="pwd-rules">
      @for (rule of passwordRules; track rule.label) {
        <div class="rule" [class.met]="rule.ok">
          <span class="rule-dot">
            @if (rule.ok) {
              <svg width="8" height="8" viewBox="0 0 8 8" aria-hidden="true">
                <path d="M1.5 4.2L3.2 5.9L6.5 2.4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            }
          </span>
          {{ rule.label }}
        </div>
      }
    </div>

    <div class="field">
      <label for="confirm">Confirme a password:</label>
      <input
        id="confirm"
        type="password"
        [formControl]="confirmPasswordCtrl"
        placeholder="••••••••"
        autocomplete="new-password"
      />
    </div>

    <label class="terms">
      <input type="checkbox" [formControl]="agreeTermsCtrl" />
      <span>
        Concordo com os
        <a class="accent" [routerLink]="'/' + Pages.TERMOS_USO">termos de uso</a>
        e a
        <a class="accent" [routerLink]="'/' + Pages.POLITICA_PRIVACIDADE">política de privacidade</a>.
      </span>
    </label>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <button type="submit" class="btn-primary" [disabled]="!canSubmit">Sign Up</button>

    <div class="divider"><span>Or sign up with</span></div>

    <button type="button" class="btn-google" (click)="signUpWithGoogle($event)">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.56c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.77c-.98.66-2.23 1.05-3.72 1.05-2.86 0-5.29-1.93-6.16-4.53H2.18v2.85A11 11 0 0 0 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09A6.6 6.6 0 0 1 5.5 12c0-.73.13-1.44.34-2.09V7.06H2.18A11 11 0 0 0 1 12c0 1.77.42 3.44 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.2 1.65l3.15-3.15A11 11 0 0 0 12 1 11 11 0 0 0 2.18 7.06l3.66 2.85C6.71 7.31 9.14 5.38 12 5.38z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </button>

    <p class="switch-link">
      Já tem uma conta?
      <a (click)="navigationService.navigateTo(Pages.SIGN_IN)">Sign in</a>
    </p>
  </form>
</div>
